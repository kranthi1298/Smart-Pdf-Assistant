<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF Chatbot — Groq</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #f0ede8;
    --text2: #888580;
    --text3: #555250;
    --accent: #d4a853;
    --accent-dim: #2a2115;
    --danger: #c0392b;
    --danger-dim: #1f0d0b;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  #container {
    width: 100%;
    max-width: 720px;
    height: 92vh;
    display: flex;
    flex-direction: column;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
  }

  /* Header */
  #header {
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
  }
  #header-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  #header-badge {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    background: var(--accent-dim);
    border: 0.5px solid #3a2d10;
    border-radius: 4px;
    padding: 2px 6px;
    letter-spacing: 0.05em;
  }
  #header-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }
  #header-dot.active { background: var(--accent); }
  #pdf-info {
    display: none;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    background: var(--accent-dim);
    border: 0.5px solid #3a2d10;
    border-radius: 20px;
    padding: 4px 10px 4px 8px;
  }
  #pdf-info.visible { display: flex; }
  #pdf-info-name {
    font-size: 11px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #pdf-clear {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 14px; line-height: 1;
    padding: 0; display: flex; align-items: center;
  }
  #pdf-clear:hover { color: var(--text2); }

  /* API key bar */
  #apikey-bar {
    padding: 10px 20px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
  }
  #apikey-bar label { font-size: 11px; color: var(--text2); white-space: nowrap; font-family: 'DM Mono', monospace; }
  #apikey-input {
    flex: 1;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    outline: none;
  }
  #apikey-input:focus { border-color: var(--accent); }
  #apikey-input::placeholder { color: var(--text3); }

  /* Model selector */
  #model-select {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 6px 8px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    outline: none;
    cursor: pointer;
  }
  #model-select:focus { border-color: var(--accent); }

  /* Upload zone */
  #upload-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    cursor: pointer;
    transition: background 0.2s;
    border-bottom: 0.5px solid var(--border);
    padding: 2rem;
  }
  #upload-zone:hover { background: #1c1c1c; }
  #upload-zone.dragover { background: var(--accent-dim); }
  #upload-zone.hidden { display: none; }
  .up-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 0.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
  }
  .up-icon svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  #upload-title { font-size: 15px; font-weight: 500; color: var(--text); }
  #upload-sub { font-size: 12px; color: var(--text2); }
  #upload-note { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  #file-input { display: none; }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    display: none;
  }
  #messages.visible { display: flex; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; max-width: 80%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .user .bubble {
    background: var(--accent);
    color: #1a1200;
    border-bottom-right-radius: 4px;
    font-weight: 500;
  }
  .bot .bubble {
    background: var(--surface2);
    color: var(--text);
    border-bottom-left-radius: 4px;
    border: 0.5px solid var(--border);
  }
  .bot.thinking .bubble { color: var(--text3); font-style: italic; }
  .bot.error .bubble {
    background: var(--danger-dim);
    color: #e88;
    border-color: #3a1515;
  }

  /* Input area */
  #input-area {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 0.5px solid var(--border);
    background: var(--surface);
  }
  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    resize: none;
    height: 42px;
    outline: none;
    line-height: 1.4;
    transition: border-color 0.15s;
  }
  #msg-input:focus { border-color: var(--accent); }
  #msg-input::placeholder { color: var(--text3); }
  #msg-input:disabled { opacity: 0.4; cursor: not-allowed; }
  #send-btn {
    width: 42px; height: 42px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--accent);
    color: #1a1200;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<div id="container">

  <div id="header">
    <div id="header-dot"></div>
    <span id="header-title">PDF Chatbot</span>
    <span id="header-badge">GROQ</span>
    <div id="pdf-info">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#d4a853" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span id="pdf-info-name"></span>
      <button id="pdf-clear" onclick="clearPDF()" title="Remove PDF">✕</button>
    </div>
  </div>

  <div id="apikey-bar">
    <label>GROQ KEY</label>
    <input type="password" id="apikey-input" placeholder="gsk_..." spellcheck="false" />
    <select id="model-select">
      <option value="llama-3.3-70b-versatile">llama-3.3-70b</option>
      <option value="llama-3.1-8b-instant">llama-3.1-8b</option>
      <option value="mixtral-8x7b-32768">mixtral-8x7b</option>
      <option value="gemma2-9b-it">gemma2-9b</option>
    </select>
  </div>

  <div id="upload-zone" onclick="document.getElementById('file-input').click()">
    <div class="up-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <div id="upload-title">Drop your PDF here</div>
    <div id="upload-sub">or click to browse</div>
    <div id="upload-note">Text will be extracted and sent to Groq</div>
    <input type="file" id="file-input" accept="application/pdf" />
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="msg-input" placeholder="Upload a PDF to begin..." disabled></textarea>
    <button id="send-btn" disabled onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>

</div>

<script>
  // Set up PDF.js worker
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfText = null;
  let history = [];
  let isLoading = false;

  const uploadZone = document.getElementById('upload-zone');
  const messagesEl = document.getElementById('messages');
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const fileInput = document.getElementById('file-input');
  const apikeyInput = document.getElementById('apikey-input');
  const modelSelect = document.getElementById('model-select');
  const headerDot = document.getElementById('header-dot');
  const pdfInfo = document.getElementById('pdf-info');
  const pdfInfoName = document.getElementById('pdf-info-name');

  // Restore saved key
  const savedKey = localStorage.getItem('groq_key');
  if (savedKey) apikeyInput.value = savedKey;
  apikeyInput.addEventListener('change', () => localStorage.setItem('groq_key', apikeyInput.value.trim()));

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') loadPDF(f);
  });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) loadPDF(e.target.files[0]); });
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
  msgInput.addEventListener('input', updateBtn);

  function updateBtn() {
    sendBtn.disabled = !msgInput.value.trim() || isLoading || !pdfText;
  }

  async function extractTextFromPDF(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const pageText = content.items.map(item => item.str).join(' ');
      fullText += `\n--- Page ${i} ---\n${pageText}`;
    }
    return fullText.trim();
  }

  async function loadPDF(file) {
    uploadZone.classList.add('hidden');
    messagesEl.classList.add('visible');
    pdfInfoName.textContent = file.name;
    pdfInfo.classList.add('visible');
    headerDot.classList.add('active');
    history = [];
    messagesEl.innerHTML = '';

    const thinkingEl = appendThinking('Extracting text from PDF…');

    try {
      pdfText = await extractTextFromPDF(file);
      thinkingEl.remove();

      if (!pdfText || pdfText.length < 10) {
        appendMessage('bot', '⚠️ Could not extract text from this PDF. It may be scanned or image-based. Try a text-based PDF.', true);
        clearPDF();
        return;
      }

      msgInput.disabled = false;
      msgInput.placeholder = 'Ask anything about your PDF...';
      appendMessage('bot', `Ready! I've read "${file.name}" (${pdf_pages(pdfText)} pages extracted). What would you like to know?`);
      msgInput.focus();
    } catch (err) {
      thinkingEl.remove();
      appendMessage('bot', 'Failed to read PDF: ' + err.message, true);
      clearPDF();
    }
  }

  function pdf_pages(text) {
    return (text.match(/--- Page \d+ ---/g) || []).length;
  }

  function clearPDF() {
    pdfText = null; history = [];
    uploadZone.classList.remove('hidden');
    messagesEl.classList.remove('visible');
    pdfInfo.classList.remove('visible');
    headerDot.classList.remove('active');
    msgInput.disabled = true; msgInput.value = '';
    msgInput.placeholder = 'Upload a PDF to begin...';
    sendBtn.disabled = true;
    fileInput.value = '';
  }

  function appendMessage(role, text, isError) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}${isError ? ' error' : ''}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function appendThinking(label) {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot thinking';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = label || 'Thinking…';
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  async function sendMessage() {
    const text = msgInput.value.trim();
    const apiKey = apikeyInput.value.trim();
    const model = modelSelect.value;
    if (!text || isLoading || !pdfText) return;
    if (!apiKey) { appendMessage('bot', 'Please enter your Groq API key above.', true); return; }

    isLoading = true;
    msgInput.value = '';
    updateBtn();
    appendMessage('user', text);
    const thinkingEl = appendThinking('Thinking…');

    // Build messages: inject PDF text as system context on first message
    const systemPrompt = `You are a helpful assistant. The user has uploaded a PDF document. Answer all questions based on the content below.\n\nPDF CONTENT:\n${pdfText.slice(0, 28000)}\n\nIf something is not in the document, clearly say so.`;

    history.push({ role: 'user', content: text });

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model,
          max_tokens: 1024,
          messages: [
            { role: 'system', content: systemPrompt },
            ...history
          ]
        })
      });

      const data = await res.json();
      thinkingEl.remove();

      if (data.error) {
        history.pop();
        appendMessage('bot', 'Groq Error: ' + data.error.message, true);
      } else {
        const reply = data.choices?.[0]?.message?.content?.trim() || 'No response received.';
        history.push({ role: 'assistant', content: reply });
        appendMessage('bot', reply);
      }
    } catch (err) {
      history.pop();
      thinkingEl.remove();
      appendMessage('bot', 'Network error: ' + err.message, true);
    }

    isLoading = false;
    updateBtn();
    msgInput.focus();
  }
</script>
</body>
</html>
